<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Infinite Canvas | Tiklam</title>
<style>
  *,*::after,*::before{box-sizing:border-box}
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:ui-monospace,monospace;-webkit-font-smoothing:antialiased}
  body{background:#ffffff;color:#fff}

  #canvas-container{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:grab}
  #canvas-container.dragging{cursor:grabbing}
  canvas{display:block;width:100%;height:100%}

  .loader-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#fff;transition:opacity .5s ease-out}
  .loader-overlay.hidden{opacity:0;pointer-events:none}
  .loader-bar-track{width:200px;height:4px;border-radius:2px;background:rgba(101,82,60,.1);overflow:hidden}
  .loader-bar-fill{height:100%;width:100%;transform-origin:left;background:rgb(101,82,60);transition:transform .15s ease-out}

  .controls-hint{position:absolute;bottom:12px;right:12px;z-index:10;border-radius:8px;background:#fff;padding:12px;color:#000;font-size:11px;box-shadow:0 0 10px rgba(0,0,0,.1);opacity:1;transition:opacity .6s ease-out;pointer-events:none}
  .controls-hint.fade-out{opacity:0}
</style>
</head>
<body>

<div class="loader-overlay" id="loader">
  <div class="loader-bar-track">
    <div class="loader-bar-fill" id="loader-bar" style="transform:scaleX(0)"></div>
  </div>
</div>

<div id="canvas-container"></div>

<div class="controls-hint" id="controls-hint"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.min.js"></script>
<script>
(function() {
  'use strict';

  // ════════════════════════════════════════════════════════════
  //  IMAGE CONFIGURATION
  //  Default images shown when no CMS images are received.
  //  These are replaced automatically when embedded in Webflow
  //  via postMessage from the parent page.
  //
  //  To edit manually: just add/remove URLs below.
  //  Images must support CORS (Unsplash, Cloudinary, same-origin).
  // ════════════════════════════════════════════════════════════
  var DEFAULT_IMAGES = [
    "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=512&q=80",
    "https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0?w=512&q=80",
    "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=512&q=80",
    "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=512&q=80",
    "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=512&q=80",
    "https://images.unsplash.com/photo-1518173946687-a2e4c8b6e86c?w=512&q=80",
    "https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?w=512&q=80",
    "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=512&q=80",
    "https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=512&q=80",
    "https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?w=512&q=80",
    "https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=512&q=80",
    "https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=512&q=80",
  ];

  // Build manifest from URLs (auto-assumes 3:2 aspect ratio)
  function buildManifest(urls) {
    return urls.map(function(entry) {
      if (typeof entry === 'string') return { url: entry, width: 512, height: 341 };
      return { url: entry.url, width: entry.width || 512, height: entry.height || 512 };
    });
  }

  var MEDIA_MANIFEST = buildManifest(DEFAULT_IMAGES);

  // ─── CMS IMAGE INTEGRATION (via postMessage) ─────────────────
  // Webflow parent sends: { type: 'update-images', images: ['url1', ...] }
  // If no message received within 3s, default images are used.
  var cmsReceived = false;

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'update-images' && Array.isArray(e.data.images) && e.data.images.length > 0) {
      cmsReceived = true;
      MEDIA_MANIFEST.length = 0;
      var newManifest = buildManifest(e.data.images);
      for (var i = 0; i < newManifest.length; i++) {
        MEDIA_MANIFEST.push(newManifest[i]);
      }
      if (typeof rebuildAllChunks === 'function') rebuildAllChunks();
    }
  });

  // ─── CONSTANTS ───────────────────────────────────────────────
  var CHUNK_SIZE        = 110;
  var ITEMS_PER_CHUNK   = 5;
  var RENDER_DISTANCE   = 2;
  var CHUNK_FADE_MARGIN = 1;
  var MAX_VELOCITY      = 3.2;
  var DEPTH_FADE_START  = 140;
  var DEPTH_FADE_END    = 260;
  var INVIS_THRESHOLD   = 0.01;
  var KEYBOARD_SPEED    = 0.18;
  var VELOCITY_LERP     = 0.16;
  var VELOCITY_DECAY    = 0.9;
  var INITIAL_CAMERA_Z  = 50;

  var CAMERA_FOV  = 60;
  var CAMERA_NEAR = 1;
  var CAMERA_FAR  = 500;
  var FOG_NEAR    = 120;
  var FOG_FAR     = 320;
  var BG_COLOR    = '#ffffff';
  var FOG_COLOR   = '#ffffff';

  // ─── UTILITIES ───────────────────────────────────────────────
  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function lerp(a, b, t) { return a + (b - a) * t; }

  function seededRandom(seed) {
    var x = Math.sin(seed * 9999) * 10000;
    return x - Math.floor(x);
  }

  function hashString(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
    return Math.abs(h);
  }

  function checkTouchDevice() {
    return ('ontouchstart' in window) || navigator.maxTouchPoints > 0 ||
           (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
  }

  function getTouchDistance(touches) {
    if (touches.length < 2) return 0;
    var dx = touches[0].clientX - touches[1].clientX;
    var dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  // ─── CHUNK OFFSETS (precomputed) ─────────────────────────────
  var maxDist = RENDER_DISTANCE + CHUNK_FADE_MARGIN;
  var CHUNK_OFFSETS = [];
  for (var dx = -maxDist; dx <= maxDist; dx++) {
    for (var dy = -maxDist; dy <= maxDist; dy++) {
      for (var dz = -maxDist; dz <= maxDist; dz++) {
        var dist = Math.max(Math.abs(dx), Math.abs(dy), Math.abs(dz));
        if (dist <= maxDist) CHUNK_OFFSETS.push({ dx: dx, dy: dy, dz: dz, dist: dist });
      }
    }
  }

  // ─── PLANE GENERATION (with cache) ──────────────────────────
  var MAX_PLANE_CACHE = 256;
  var planeCache = new Map();

  function generateChunkPlanes(cx, cy, cz) {
    var key = cx + ',' + cy + ',' + cz;
    if (planeCache.has(key)) {
      var v = planeCache.get(key);
      planeCache.delete(key);
      planeCache.set(key, v);
      return v;
    }

    var seed = hashString(key);
    var planes = [];

    for (var i = 0; i < ITEMS_PER_CHUNK; i++) {
      var s = seed + i * 1000;
      var r = (function(base) { return function(n) { return seededRandom(base + n); }; })(s);
      var size = 12 + r(4) * 8;

      planes.push({
        id: cx + '-' + cy + '-' + cz + '-' + i,
        px: cx * CHUNK_SIZE + r(0) * CHUNK_SIZE,
        py: cy * CHUNK_SIZE + r(1) * CHUNK_SIZE,
        pz: cz * CHUNK_SIZE + r(2) * CHUNK_SIZE,
        size: size,
        mediaIndex: Math.floor(r(5) * 1000000),
      });
    }

    planeCache.set(key, planes);
    while (planeCache.size > MAX_PLANE_CACHE) {
      var firstKey = planeCache.keys().next().value;
      planeCache.delete(firstKey);
    }

    return planes;
  }

  // ─── THREE.JS SETUP ─────────────────────────────────────────
  var container = document.getElementById('canvas-container');
  var isTouch = checkTouchDevice();
  var dpr = Math.min(window.devicePixelRatio || 1, isTouch ? 1.25 : 1.5);

  var renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(dpr);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(new THREE.Color(BG_COLOR));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  container.appendChild(renderer.domElement);

  var scene = new THREE.Scene();
  scene.fog = new THREE.Fog(new THREE.Color(FOG_COLOR), FOG_NEAR, FOG_FAR);

  var camera = new THREE.PerspectiveCamera(CAMERA_FOV, window.innerWidth / window.innerHeight, CAMERA_NEAR, CAMERA_FAR);
  camera.position.set(0, 0, INITIAL_CAMERA_Z);

  var sharedGeometry = new THREE.PlaneGeometry(1, 1);

  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ─── TEXTURE MANAGER ────────────────────────────────────────
  var textureCache = new Map();
  var textureLoader = new THREE.TextureLoader();
  textureLoader.crossOrigin = 'anonymous';
  var totalToLoad = 0;
  var totalLoaded = 0;

  function getTexture(item, onLoad) {
    var key = item.url;
    var existing = textureCache.get(key);
    if (existing) {
      if (existing._loaded && onLoad) onLoad(existing);
      return existing;
    }

    totalToLoad++;
    var tex = textureLoader.load(
      key,
      function(t) {
        t.minFilter = THREE.LinearMipmapLinearFilter;
        t.magFilter = THREE.LinearFilter;
        t.generateMipmaps = true;
        t.anisotropy = Math.min(4, renderer.capabilities.getMaxAnisotropy());
        t.colorSpace = THREE.SRGBColorSpace;
        t.needsUpdate = true;
        t._loaded = true;
        totalLoaded++;
        updateLoaderProgress();
        if (onLoad) onLoad(t);
      },
      undefined,
      function() {
        console.warn('Texture load failed:', key);
        // Create colored placeholder so canvas is never blank
        var c = document.createElement('canvas');
        c.width = 64; c.height = 64;
        var ctx = c.getContext('2d');
        var hue = hashString(key) % 360;
        ctx.fillStyle = 'hsl(' + hue + ', 25%, 88%)';
        ctx.fillRect(0, 0, 64, 64);
        var fallback = new THREE.CanvasTexture(c);
        fallback.colorSpace = THREE.SRGBColorSpace;
        fallback._loaded = true;
        textureCache.set(key, fallback);
        totalLoaded++;
        updateLoaderProgress();
        if (onLoad) onLoad(fallback);
      }
    );
    tex._loaded = false;
    textureCache.set(key, tex);
    return tex;
  }

  // ─── LOADER ─────────────────────────────────────────────────
  var loaderEl = document.getElementById('loader');
  var loaderBar = document.getElementById('loader-bar');
  var loaderMinTimeElapsed = false;
  var loaderDismissed = false;

  setTimeout(function() { loaderMinTimeElapsed = true; }, 1500);

  function updateLoaderProgress() {
    if (loaderDismissed) return;
    var pct = totalToLoad > 0 ? totalLoaded / totalToLoad : 0;
    loaderBar.style.transform = 'scaleX(' + pct + ')';
    if (pct >= 1 && loaderMinTimeElapsed) {
      loaderDismissed = true;
      setTimeout(function() { loaderEl.classList.add('hidden'); }, 200);
    }
  }

  // Force dismiss loader after 6s no matter what (safety net)
  setTimeout(function() {
    if (!loaderDismissed) {
      loaderDismissed = true;
      loaderBar.style.transform = 'scaleX(1)';
      loaderEl.classList.add('hidden');
    }
    // Check if any real textures loaded
    var anyLoaded = false;
    textureCache.forEach(function(tex) {
      if (tex._loaded) anyLoaded = true;
    });
    if (!anyLoaded && MEDIA_MANIFEST.length > 0) {
      var errDiv = document.createElement('div');
      errDiv.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:100';
      errDiv.textContent = 'Images failed to load. Check image URLs and CORS settings.';
      document.body.appendChild(errDiv);
      setTimeout(function() { errDiv.style.opacity = '0'; errDiv.style.transition = 'opacity 1s'; }, 8000);
    }
  }, 6000);

  // ─── CONTROLS HINT ──────────────────────────────────────────
  var hintEl = document.getElementById('controls-hint');
  hintEl.textContent = isTouch
    ? 'اسحب للتنقل · اقرص للتكبير'
    : 'WASD Move · QE Up/Down · Scroll Zoom';
  setTimeout(function() { hintEl.classList.add('fade-out'); }, 5000);

  // ─── MESH POOL (chunk meshes) ───────────────────────────────
  var activeChunks = new Map();

  function createPlaneMesh(planeData, mediaItem) {
    var material = new THREE.MeshBasicMaterial({
      transparent: true,
      opacity: 0,
      depthWrite: false,
      side: THREE.DoubleSide,
    });

    var mesh = new THREE.Mesh(sharedGeometry, material);

    var aspect = (mediaItem.width && mediaItem.height) ? mediaItem.width / mediaItem.height : 1;
    mesh.scale.set(planeData.size * aspect, planeData.size, 1);
    mesh.position.set(planeData.px, planeData.py, planeData.pz);
    mesh.visible = false;

    mesh._fadeOpacity = 0;
    mesh._frameCount = 0;
    mesh._textureReady = false;
    mesh._chunkCx = 0;
    mesh._chunkCy = 0;
    mesh._chunkCz = 0;

    getTexture(mediaItem, function(tex) {
      material.map = tex;
      material.needsUpdate = true;
      mesh._textureReady = true;
    });

    return mesh;
  }

  function addChunk(cx, cy, cz) {
    var key = cx + ',' + cy + ',' + cz;
    if (activeChunks.has(key)) return;

    var planes = generateChunkPlanes(cx, cy, cz);
    var meshes = [];

    for (var i = 0; i < planes.length; i++) {
      var p = planes[i];
      var mediaItem = MEDIA_MANIFEST[p.mediaIndex % MEDIA_MANIFEST.length];
      if (!mediaItem) continue;
      var mesh = createPlaneMesh(p, mediaItem);
      mesh._chunkCx = cx;
      mesh._chunkCy = cy;
      mesh._chunkCz = cz;
      scene.add(mesh);
      meshes.push(mesh);
    }

    activeChunks.set(key, { meshes: meshes });
  }

  function removeChunk(key) {
    var chunk = activeChunks.get(key);
    if (!chunk) return;
    for (var i = 0; i < chunk.meshes.length; i++) {
      scene.remove(chunk.meshes[i]);
      chunk.meshes[i].material.dispose();
    }
    activeChunks.delete(key);
  }

  function updateChunks(cx, cy, cz) {
    var neededKeys = new Set();
    for (var i = 0; i < CHUNK_OFFSETS.length; i++) {
      var o = CHUNK_OFFSETS[i];
      var key = (cx + o.dx) + ',' + (cy + o.dy) + ',' + (cz + o.dz);
      neededKeys.add(key);
      addChunk(cx + o.dx, cy + o.dy, cz + o.dz);
    }

    activeChunks.forEach(function(_, key) {
      if (!neededKeys.has(key)) removeChunk(key);
    });
  }

  function rebuildAllChunks() {
    activeChunks.forEach(function(_, key) { removeChunk(key); });
    planeCache.clear();
    textureCache.clear();
    totalToLoad = 0;
    totalLoaded = 0;
    updateChunks(ctrl.cameraGrid.cx, ctrl.cameraGrid.cy, ctrl.cameraGrid.cz);
  }

  // ─── CAMERA CONTROLLER STATE ────────────────────────────────
  var ctrl = {
    velocity:   { x: 0, y: 0, z: 0 },
    targetVel:  { x: 0, y: 0, z: 0 },
    basePos:    { x: 0, y: 0, z: INITIAL_CAMERA_Z },
    drift:      { x: 0, y: 0 },
    mouse:      { x: 0, y: 0 },
    lastMouse:  { x: 0, y: 0 },
    scrollAccum: 0,
    isDragging: false,
    lastTouches: [],
    lastTouchDist: 0,
    lastChunkKey: '',
    lastChunkUpdate: 0,
    pendingChunk: null,
    cameraGrid: { cx: 0, cy: 0, cz: 0 },
    keys: { forward: false, backward: false, left: false, right: false, up: false, down: false },
  };

  // ─── INPUT HANDLERS ─────────────────────────────────────────
  var canvasEl = renderer.domElement;

  canvasEl.addEventListener('mousedown', function(e) {
    ctrl.isDragging = true;
    ctrl.lastMouse = { x: e.clientX, y: e.clientY };
    container.classList.add('dragging');
  });

  window.addEventListener('mouseup', function() {
    ctrl.isDragging = false;
    container.classList.remove('dragging');
  });

  window.addEventListener('mousemove', function(e) {
    ctrl.mouse = {
      x: (e.clientX / window.innerWidth) * 2 - 1,
      y: -(e.clientY / window.innerHeight) * 2 + 1,
    };
    if (ctrl.isDragging) {
      ctrl.targetVel.x -= (e.clientX - ctrl.lastMouse.x) * 0.025;
      ctrl.targetVel.y += (e.clientY - ctrl.lastMouse.y) * 0.025;
      ctrl.lastMouse = { x: e.clientX, y: e.clientY };
    }
  });

  canvasEl.addEventListener('mouseleave', function() {
    ctrl.mouse = { x: 0, y: 0 };
    ctrl.isDragging = false;
    container.classList.remove('dragging');
  });

  canvasEl.addEventListener('wheel', function(e) {
    e.preventDefault();
    ctrl.scrollAccum += e.deltaY * 0.006;
  }, { passive: false });

  canvasEl.addEventListener('touchstart', function(e) {
    e.preventDefault();
    ctrl.lastTouches = Array.from(e.touches);
    ctrl.lastTouchDist = getTouchDistance(ctrl.lastTouches);
    container.classList.add('dragging');
  }, { passive: false });

  canvasEl.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var touches = Array.from(e.touches);
    if (touches.length === 1 && ctrl.lastTouches.length >= 1) {
      var t = touches[0], lt = ctrl.lastTouches[0];
      if (t && lt) {
        ctrl.targetVel.x -= (t.clientX - lt.clientX) * 0.02;
        ctrl.targetVel.y += (t.clientY - lt.clientY) * 0.02;
      }
    } else if (touches.length === 2 && ctrl.lastTouchDist > 0) {
      var d = getTouchDistance(touches);
      ctrl.scrollAccum += (ctrl.lastTouchDist - d) * 0.006;
      ctrl.lastTouchDist = d;
    }
    ctrl.lastTouches = touches;
  }, { passive: false });

  canvasEl.addEventListener('touchend', function(e) {
    ctrl.lastTouches = Array.from(e.touches);
    ctrl.lastTouchDist = getTouchDistance(ctrl.lastTouches);
    container.classList.remove('dragging');
  }, { passive: false });

  var keyMap = {
    w: 'forward', W: 'forward', ArrowUp: 'forward',
    s: 'backward', S: 'backward', ArrowDown: 'backward',
    a: 'left', A: 'left', ArrowLeft: 'left',
    d: 'right', D: 'right', ArrowRight: 'right',
    e: 'up', E: 'up',
    q: 'down', Q: 'down',
  };

  window.addEventListener('keydown', function(e) {
    var action = keyMap[e.key];
    if (action) ctrl.keys[action] = true;
  });

  window.addEventListener('keyup', function(e) {
    var action = keyMap[e.key];
    if (action) ctrl.keys[action] = false;
  });

  // ─── INITIAL CHUNKS ─────────────────────────────────────────
  updateChunks(0, 0, 0);

  // ─── ANIMATION LOOP ─────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    var now = performance.now();

    if (ctrl.keys.forward)  ctrl.targetVel.z -= KEYBOARD_SPEED;
    if (ctrl.keys.backward) ctrl.targetVel.z += KEYBOARD_SPEED;
    if (ctrl.keys.left)     ctrl.targetVel.x -= KEYBOARD_SPEED;
    if (ctrl.keys.right)    ctrl.targetVel.x += KEYBOARD_SPEED;
    if (ctrl.keys.down)     ctrl.targetVel.y -= KEYBOARD_SPEED;
    if (ctrl.keys.up)       ctrl.targetVel.y += KEYBOARD_SPEED;

    var isZooming = Math.abs(ctrl.velocity.z) > 0.05;
    var zoomFactor = clamp(ctrl.basePos.z / 50, 0.3, 2.0);
    var driftAmount = 8.0 * zoomFactor;
    var driftLerp = isZooming ? 0.2 : 0.12;

    if (!ctrl.isDragging) {
      if (isTouch) {
        ctrl.drift.x = lerp(ctrl.drift.x, 0, driftLerp);
        ctrl.drift.y = lerp(ctrl.drift.y, 0, driftLerp);
      } else {
        ctrl.drift.x = lerp(ctrl.drift.x, ctrl.mouse.x * driftAmount, driftLerp);
        ctrl.drift.y = lerp(ctrl.drift.y, ctrl.mouse.y * driftAmount, driftLerp);
      }
    }

    ctrl.targetVel.z += ctrl.scrollAccum;
    ctrl.scrollAccum *= 0.8;

    ctrl.targetVel.x = clamp(ctrl.targetVel.x, -MAX_VELOCITY, MAX_VELOCITY);
    ctrl.targetVel.y = clamp(ctrl.targetVel.y, -MAX_VELOCITY, MAX_VELOCITY);
    ctrl.targetVel.z = clamp(ctrl.targetVel.z, -MAX_VELOCITY, MAX_VELOCITY);

    ctrl.velocity.x = lerp(ctrl.velocity.x, ctrl.targetVel.x, VELOCITY_LERP);
    ctrl.velocity.y = lerp(ctrl.velocity.y, ctrl.targetVel.y, VELOCITY_LERP);
    ctrl.velocity.z = lerp(ctrl.velocity.z, ctrl.targetVel.z, VELOCITY_LERP);

    ctrl.basePos.x += ctrl.velocity.x;
    ctrl.basePos.y += ctrl.velocity.y;
    ctrl.basePos.z += ctrl.velocity.z;

    camera.position.set(
      ctrl.basePos.x + ctrl.drift.x,
      ctrl.basePos.y + ctrl.drift.y,
      ctrl.basePos.z
    );

    ctrl.targetVel.x *= VELOCITY_DECAY;
    ctrl.targetVel.y *= VELOCITY_DECAY;
    ctrl.targetVel.z *= VELOCITY_DECAY;

    var cx = Math.floor(ctrl.basePos.x / CHUNK_SIZE);
    var cy = Math.floor(ctrl.basePos.y / CHUNK_SIZE);
    var cz = Math.floor(ctrl.basePos.z / CHUNK_SIZE);

    ctrl.cameraGrid = { cx: cx, cy: cy, cz: cz };

    var key = cx + ',' + cy + ',' + cz;
    if (key !== ctrl.lastChunkKey) {
      ctrl.pendingChunk = { cx: cx, cy: cy, cz: cz };
      ctrl.lastChunkKey = key;
    }

    var zoomSpeed = Math.abs(ctrl.velocity.z);
    var throttleMs = zoomSpeed > 1.0 ? 500 : isZooming ? 400 : 100;

    if (ctrl.pendingChunk && (now - ctrl.lastChunkUpdate >= throttleMs)) {
      updateChunks(ctrl.pendingChunk.cx, ctrl.pendingChunk.cy, ctrl.pendingChunk.cz);
      ctrl.pendingChunk = null;
      ctrl.lastChunkUpdate = now;
    }

    activeChunks.forEach(function(chunk) {
      for (var i = 0; i < chunk.meshes.length; i++) {
        var mesh = chunk.meshes[i];
        if (!mesh._textureReady) continue;

        mesh._frameCount = (mesh._frameCount + 1) & 1;

        var mat = mesh.material;
        var opacity = mesh._fadeOpacity;

        if (opacity < INVIS_THRESHOLD && !mesh.visible && mesh._frameCount === 0) continue;

        var chunkDist = Math.max(
          Math.abs(mesh._chunkCx - cx),
          Math.abs(mesh._chunkCy - cy),
          Math.abs(mesh._chunkCz - cz)
        );
        var absDepth = Math.abs(mesh.position.z - ctrl.basePos.z);

        if (absDepth > DEPTH_FADE_END + 50) {
          mesh._fadeOpacity = 0;
          mat.opacity = 0;
          mat.depthWrite = false;
          mesh.visible = false;
          continue;
        }

        var gridFade = chunkDist <= RENDER_DISTANCE
          ? 1
          : Math.max(0, 1 - (chunkDist - RENDER_DISTANCE) / Math.max(CHUNK_FADE_MARGIN, 0.0001));

        var depthFade = absDepth <= DEPTH_FADE_START
          ? 1
          : Math.max(0, 1 - (absDepth - DEPTH_FADE_START) / Math.max(DEPTH_FADE_END - DEPTH_FADE_START, 0.0001));

        var target = Math.min(gridFade, depthFade * depthFade);

        mesh._fadeOpacity = (target < INVIS_THRESHOLD && opacity < INVIS_THRESHOLD)
          ? 0
          : lerp(opacity, target, 0.18);

        var isFullyOpaque = mesh._fadeOpacity > 0.99;
        mat.opacity = isFullyOpaque ? 1 : mesh._fadeOpacity;
        mat.depthWrite = isFullyOpaque;
        mesh.visible = mesh._fadeOpacity > INVIS_THRESHOLD;
      }
    });

    renderer.render(scene, camera);
  }

  animate();
})();
</script>
</body>
</html>
